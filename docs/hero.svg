<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2056" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ff2056" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ff2056" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b5341a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#c0552e" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7a1f3d" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vig" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#0b0b0d" stop-opacity="0"/>
      <stop offset="1" stop-color="#0b0b0d" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="420" fill="#0b0b0d"/>

  <!-- vertical "stage" bars, like the app's home screen -->
  <g>
    <rect x="70"   width="26" height="420" fill="url(#bar2)"/>
    <rect x="150"  width="14" height="420" fill="url(#bar)"/>
    <rect x="245"  width="40" height="420" fill="url(#bar2)"/>
    <rect x="360"  width="10" height="420" fill="url(#bar)"/>
    <rect x="470"  width="20" height="420" fill="url(#bar2)"/>
    <rect x="900"  width="18" height="420" fill="url(#bar)"/>
    <rect x="980"  width="34" height="420" fill="url(#bar2)"/>
    <rect x="1075" width="12" height="420" fill="url(#bar)"/>
    <rect x="1130" width="24" height="420" fill="url(#bar2)"/>
  </g>

  <rect width="1200" height="420" fill="url(#vig)"/>

  <!-- logo mark -->
  <g transform="translate(600,118)">
    <rect x="-30" y="-30" width="60" height="60" rx="14" fill="#ff2056"/>
    <text x="0" y="13" text-anchor="middle" font-size="40" font-weight="800" fill="#0b0b0d">R</text>
  </g>

  <text x="600" y="232" text-anchor="middle" font-size="64" font-weight="800" fill="#f4f4f5" letter-spacing="-1">Red Request</text>
  <text x="600" y="276" text-anchor="middle" font-size="23" fill="#a1a1aa">The open-source, white-label API client.</text>

  <!-- faux request chip -->
  <g transform="translate(600,330)">
    <rect x="-235" y="-21" width="470" height="42" rx="10" fill="#141417" stroke="#26262d"/>
    <text x="-212" y="6" font-size="16" font-weight="800" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#34d399">GET</text>
    <text x="-158" y="6" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#e4e4e7">https://{{host}}/users/:id</text>
    <rect x="150" y="-13" width="76" height="26" rx="7" fill="#ff2056"/>
    <text x="188" y="5" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0d">Send</text>
  </g>

  <text x="600" y="392" text-anchor="middle" font-size="14" fill="#71717a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">HTTP · TCP · UDP · DNS · WHOIS · ping &#8212; powered by recker</text>
</svg>
