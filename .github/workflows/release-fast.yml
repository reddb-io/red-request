name: Release Fast

on:
  workflow_dispatch:
    inputs:
      reddb_version:
        description: "Pinned RedDB release tag to smoke-package with"
        required: true
        default: "v1.13.1"
      reddb_source_ref:
        description: "Optional RedDB source commit/ref to build instead of downloading release assets"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-fast-${{ github.ref }}
  cancel-in-progress: true

env:
  REDDB_VERSION: ${{ github.event.inputs.reddb_version }}
  REDDB_SOURCE_REF: ${{ github.event.inputs.reddb_source_ref }}

jobs:
  linux-deb:
    name: linux-x86_64 deb smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential curl wget file libssl-dev libxdo-dev \
            clang mold

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Set up protoc for RedDB source build
        if: env.REDDB_SOURCE_REF != ''
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout RedDB source
        if: env.REDDB_SOURCE_REF != ''
        uses: actions/checkout@v7
        with:
          repository: reddb-io/reddb
          ref: ${{ env.REDDB_SOURCE_REF }}
          path: .red/tmp/reddb-source
          persist-credentials: false

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target
            .red/tmp/reddb-source -> target

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check RedDB sidecar release asset
        run: node scripts/check-reddb-release-assets.mjs x86_64-unknown-linux-gnu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Brand sync
        run: pnpm brand:sync

      - name: Brand icons
        run: pnpm brand:icons

      - name: Build core contract
        run: pnpm --filter @reddb-io/request-core build

      - name: Build engine sidecar
        run: pnpm engine:build

      - name: Provision RedDB sidecar (source)
        if: env.REDDB_SOURCE_REF != ''
        run: pnpm reddb:sync
        env:
          REDDB_SRC: ${{ github.workspace }}/.red/tmp/reddb-source
          REDDB_TARGET: x86_64-unknown-linux-gnu

      - name: Provision RedDB sidecar (download)
        if: env.REDDB_SOURCE_REF == ''
        run: pnpm reddb:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDB_TARGET: x86_64-unknown-linux-gnu

      - name: Build Linux deb only
        run: pnpm --filter @reddb-io/request-desktop tauri build --bundles deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: red-request-linux-x86_64-deb
          path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
