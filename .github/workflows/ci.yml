name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: typecheck · test · build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Brand sync
        run: pnpm brand:sync

      # Build first: engine/ui typecheck against @red-request/core's built .d.ts.
      - name: Build (core + engine + ui)
        run: pnpm build

      - name: Typecheck
        run: pnpm check

      - name: Test
        run: pnpm test

  rust-fmt:
    name: rust fmt
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all --check
