name: Changesets

on:
  push:
    branches: [main]

concurrency:
  group: changesets-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  changesets:
    name: Version Packages
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Skip the version-bump commit itself (authored by the bot) to avoid a loop.
    if: github.actor != 'github-actions[bot]'
    # Disable lefthook: the action's version-bump git commit would otherwise fire the
    # pre-commit hook (pnpm check), which fails here because core isn't built in this job.
    env:
      LEFTHOOK: "0"
    permissions:
      contents: write
      pull-requests: write
      actions: write # so the publish step can dispatch release.yml (no PAT needed)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Create release PR or tag the release
        uses: changesets/action@v1
        with:
          # `release:version` runs `changeset version` then propagates the new version
          # into tauri.conf.json via scripts/sync-desktop-version.mjs.
          version: pnpm release:version
          # Runs once every pending changeset is consumed (Version PR merged):
          # tags v<version> AND dispatches release.yml (which builds + releases).
          publish: bash scripts/changesets-tag-release.sh
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          # release.yml owns the GitHub Release (built bundles); don't let the action make one.
          createGithubReleases: false
        env:
          # No PAT needed — the publish script pushes the tag, then triggers release.yml via
          # `gh workflow run` (workflow_dispatch), which GITHUB_TOKEN is allowed to do.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
