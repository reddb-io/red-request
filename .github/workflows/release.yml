name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.0 (must already exist)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # RedDB sidecar pinned for reproducible builds — bump when adopting a newer reddb.
  REDDB_VERSION: v1.11.0
  # Run AppImage tooling (linuxdeploy) without FUSE, which CI runners lack.
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: blacksmith-8vcpu-ubuntu-2404,
              target: x86_64-unknown-linux-gnu,
              label: linux-x86_64,
            }
          - {
              os: blacksmith-6vcpu-macos-15,
              target: aarch64-apple-darwin,
              label: macos-arm64,
            }
          - {
              os: blacksmith-8vcpu-windows-2025,
              target: x86_64-pc-windows-msvc,
              label: windows-x86_64,
            }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential curl wget file libssl-dev libxdo-dev \
            clang mold
          # src-tauri/.cargo/config.toml pins -fuse-ld=mold for Linux links.

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Brand sync
        run: pnpm brand:sync

      - name: Build core (UI/engine contract)
        run: pnpm --filter @red-request/core build

      - name: Build engine sidecar (Bun → externalBin)
        run: pnpm engine:build

      # Linux/Windows: download the prebuilt `red` from reddb's releases.
      - name: Provision RedDB sidecar (download)
        if: runner.os != 'macOS'
        run: pnpm reddb:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS: reddb doesn't publish darwin binaries yet, so build `red` from source at the
      # pinned tag (Apple Silicon). reddb's gRPC build needs protoc. Swap to reddb:fetch once
      # reddb ships darwin binaries.
      - name: Provision RedDB sidecar (build from source)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          git clone --depth 1 --branch "$REDDB_VERSION" https://github.com/reddb-io/reddb.git "$RUNNER_TEMP/reddb"
          REDDB_SRC="$RUNNER_TEMP/reddb" pnpm reddb:sync

      - name: Build + publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Red Request ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Desktop builds of Red Request. Download the asset for your platform below.

            **Linux** — `curl -fsSL https://raw.githubusercontent.com/reddb-io/red-request/main/install.sh | bash` (or grab the `.AppImage` / `.deb`).
            **macOS** — open the `.dmg` (Apple Silicon = `aarch64`, Intel = `x64`).
            **Windows** — run the `.msi` or the NSIS `-setup.exe`.

            Unsigned builds for now — macOS: right-click → Open; Windows: "More info → Run anyway".
          releaseDraft: false
          prerelease: false
