name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.0 (must already exist)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # RedDB sidecar pinned for reproducible builds — bump when adopting a newer reddb.
  # v1.15.0: multi-model MVCC history (reddb PR #1383) — versioned KV/document. REQUIRED
  # for the app's native VCS (request history / time-travel / restore): earlier releases
  # pinned v1.13.1, which lacks versioned KV, so VCS silently no-opped in shipped builds
  # even though it worked against latest reddb in dev. Keeps the static (musl)
  # `red-linux-<arch>-static` assets fetch-reddb.mjs prefers (the dynamic `red-linux-x86_64`
  # links the build host's glibc and crash-loops on older distros, "GLIBC_2.39 not found",
  # → black/loading screen). Also persists collection contracts so KV collections survive a
  # server restart (reddb fix a8139467).
  REDDB_VERSION: v1.15.0
  # Run AppImage tooling (linuxdeploy) without FUSE, which CI runners lack.
  APPIMAGE_EXTRACT_AND_RUN: "1"
  # linuxdeploy's strip pass chokes on some shared objects under the no-FUSE extract path
  # and aborts the whole AppImage bundle ("failed to run linuxdeploy"); skip it.
  NO_STRIP: "1"

jobs:
  preflight:
    name: release preflight
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check RedDB sidecar release assets
        # Linux-only for now: RedDB publishes only the linux sidecar (red-linux-x86_64).
        # Re-add x86_64-pc-windows-msvc here (and the windows matrix leg below) once reddb
        # ships red-windows-x86_64.exe.
        run: node scripts/check-reddb-release-assets.mjs x86_64-unknown-linux-gnu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ships BOTH the AppImage (single-file, what install.sh pulls) and the .deb
          # (apt crowd). AppImage tooling runs without FUSE via APPIMAGE_EXTRACT_AND_RUN
          # (set in env above). ubuntu-22.04 GitHub-hosted.
          - {
              os: ubuntu-22.04,
              target: x86_64-unknown-linux-gnu,
              label: linux-x86_64,
              args: "--bundles deb,appimage",
            }
          # macOS (build-from-source) and Windows (reddb:fetch) legs are temporarily
          # dropped: reddb publishes only the linux sidecar, so the windows leg fails
          # preflight and blocks the whole publish. Restore both legs once reddb ships
          # red-windows-x86_64.exe (and a darwin binary, to swap macOS off the source build).
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev build-essential curl wget file libssl-dev libxdo-dev \
            clang mold
          # FUSE2 runtime so linuxdeploy/AppImage can run (24.04 renamed libfuse2 → libfuse2t64).
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2
          # src-tauri/.cargo/config.toml pins -fuse-ld=mold for Linux links.

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Brand sync
        run: pnpm brand:sync

      - name: Brand icons (regenerate from brand.iconPath, if set)
        run: pnpm brand:icons

      - name: Build core (UI/engine contract)
        run: pnpm --filter @red-request/core build

      - name: Build engine sidecar (Bun → externalBin)
        run: pnpm engine:build

      # Linux/Windows: download the prebuilt `red` from reddb's releases.
      - name: Provision RedDB sidecar (download)
        if: runner.os != 'macOS'
        run: pnpm reddb:fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS: reddb doesn't publish darwin binaries yet, so build `red` from source at the
      # pinned tag (Apple Silicon). reddb's gRPC build needs protoc. Swap to reddb:fetch once
      # reddb ships darwin binaries.
      - name: Provision RedDB sidecar (build from source)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf
          git clone --depth 1 --branch "$REDDB_VERSION" https://github.com/reddb-io/reddb.git "$RUNNER_TEMP/reddb"
          REDDB_SRC="$RUNNER_TEMP/reddb" pnpm reddb:sync

      # linuxdeploy runs `ldd` on every bundled ELF, including the externalBin sidecars
      # (`red` from reddb, `red-request-engine` from Bun --compile). Those are effectively
      # static/packed, so `ldd` exits 1 ("not a dynamic executable") and linuxdeploy aborts
      # the whole AppImage ("Failed to run ldd: exited with code 1"). Shim ldd to print real
      # output but never fail, so the sidecars are bundled as-is and the AppImage completes.
      - name: Make ldd tolerant of static sidecars (AppImage)
        if: runner.os == 'Linux'
        run: |
          shim="$HOME/.ldd-shim"
          mkdir -p "$shim"
          cat > "$shim/ldd" <<'SH'
          #!/usr/bin/env bash
          /usr/bin/ldd "$@"; exit 0
          SH
          chmod +x "$shim/ldd"
          echo "$shim" >> "$GITHUB_PATH"

      - name: Build + publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Red Request ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## Install

            **Linux** — one line; auto-upgrades on re-run, removes cleanly with the uninstaller:
            ```
            curl -fsSL https://raw.githubusercontent.com/reddb-io/red-request/main/install.sh | bash
            ```
            Pulls the single-file `red-request-linux-x86_64.AppImage`, verifies its sha256 against
            `checksums.txt`, and drops `red-request` (+ an `rr` shortcut) on your PATH. Prefer apt?
            Grab the `.deb`.

            _macOS and Windows builds are paused while the RedDB sidecar ships Linux-only; they'll return in a later release._

            Every asset's sha256 is in `checksums.txt`. Unsigned builds for now.
          releaseDraft: false
          prerelease: false

      # Re-publish each platform's single-file bundle under a stable, version-free name so
      # install.sh can fetch `…/releases/latest/download/red-request-<os>-<arch>.<ext>` without
      # parsing the API. Best-effort per file: a missing bundle warns, never fails the release.
      - name: Stage portable assets
        shell: bash
        run: |
          set -uo pipefail
          BR="apps/desktop/src-tauri/target/release/bundle"
          OUT="${RUNNER_TEMP}/portable"; mkdir -p "$OUT"
          stage() { # glob dest
            local f; f="$(ls $1 2>/dev/null | head -1 || true)"
            if [[ -n "$f" ]]; then cp "$f" "$OUT/$2"; echo "staged $2  ← $(basename "$f")"
            else echo "::warning::no bundle matched $1"; fi
          }
          case "${{ runner.os }}" in
            Linux)
              stage "$BR/appimage/*.AppImage" "red-request-linux-x86_64.AppImage"
              stage "$BR/deb/*.deb"           "red-request-linux-x86_64.deb" ;;
            macOS)
              stage "$BR/dmg/*.dmg"           "red-request-darwin-aarch64.dmg" ;;
            Windows)
              stage "$BR/nsis/*-setup.exe"    "red-request-windows-x86_64-setup.exe" ;;
          esac
          ls -la "$OUT"

      - name: Upload portable assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          shopt -s nullglob
          files=("${RUNNER_TEMP}/portable"/*)
          [[ ${#files[@]} -gt 0 ]] || { echo "nothing to upload"; exit 0; }
          gh release upload "$TAG" "${files[@]}" --clobber -R "$GITHUB_REPOSITORY"

  # One checksums.txt covering every staged single-file asset, after all builds land.
  checksums:
    name: checksums
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Generate + publish checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          work="$(mktemp -d)"; cd "$work"
          # Only the stable, version-free assets staged by the build jobs (tauri's native
          # names use `red-request_<ver>_…`, so the `red-request-*` glob skips them).
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p 'red-request-*' --skip-existing
          shopt -s nullglob
          assets=(red-request-*)
          [[ ${#assets[@]} -gt 0 ]] || { echo "no portable assets to checksum"; exit 0; }
          sha256sum "${assets[@]}" > checksums.txt
          echo "── checksums.txt ──"; cat checksums.txt
          gh release upload "$TAG" checksums.txt --clobber -R "$GITHUB_REPOSITORY"
