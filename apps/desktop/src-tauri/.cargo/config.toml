# clang + mold for faster Linux links (mirrors red-ui). Local Linux dev needs
# `clang` and `mold` on PATH; harmless elsewhere (target-scoped).
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
